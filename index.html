<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenaa Mega Game Centre</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #0a0f1e;
            color: white;
            text-align: center;
        }
        header {
            background: #1e2a3a;
            padding: 30px;
            font-size: 32px;
            font-weight: bold;
        }
        .games, .location, .price {
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            background: #16213e;
            border-radius: 16px;
        }
        .games img {
            width: 150px;
            margin: 10px;
            border-radius: 12px;
        }
        button {
            background: #f4a261;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 40px;
            margin: 30px;
            cursor: pointer;
        }
        footer {
            background: #1e2a3a;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>🎮Zenaa Mega Game Centre 🎮</header>

    <div class="games">
        <h2>🔥 Games We Offer</h2>
        <p>PS5 | PS4 | FIFA (Football) | GTA V | Arcade Classics | Adventure Games</p>
        <img src="https://via.placeholder.com/150?text=PS5" alt="PS5">
        <img src="https://via.placeholder.com/150?text=PS4" alt="PS4">
        <img src="https://via.placeholder.com/150?text=FIFA" alt="FIFA">
        <img src="https://via.placeholder.com/150?text=GTA" alt="GTA">
    </div>

    <div class="price">
        <h2>💰 Price Per Game</h2>
        <p>10 GHS per hour (per person)</p>
    </div>

    <div class="location">
        <h2>📍 Location</h2>
        <p>SI Appiah Street, Accra, Ghana</p>
    </div>

    <button onclick="window.location.href='booking.html'">📅 Book a Session</button>

    <footer>Zenaa Mega Game Centre – Ultimate Gaming Experience</footer>
</body>
</html>
